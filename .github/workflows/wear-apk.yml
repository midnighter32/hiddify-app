name: Wear OS APK

on:
  push:
    branches:
      - wear-os-support
    paths:
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'dependencies.properties'
      - '.github/workflows/wear-apk.yml'
  pull_request:
    paths:
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
  workflow_dispatch:

concurrency:
  group: wear-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.38.5'
  # Use the stable prebuilt core release (matches dependencies.properties).
  CHANNEL: prod

jobs:
  build-wear-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-wear-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-wear-${{ runner.os }}-

      # Installs Dart deps, runs codegen (build_runner + slang) and downloads
      # the prebuilt hiddify-core AAR into android/app/libs.
      - name: Prepare (deps, codegen, core libs)
        run: make android-prepare

      - name: Build Wear OS APK (armeabi-v7a)
        run: flutter build apk --debug -t lib/main_wear.dart --target-platform android-arm

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hiddify-wear-armeabi-v7a
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-debug.apk
          if-no-files-found: error
